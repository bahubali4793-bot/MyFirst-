<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Tic Tac Toe 6x6</title>

<style>
:root{
  --bg1:#e0f2fe;
  --bg2:#ede9fe;
  --bg3:#dcfce7;
  --panel1:#eef2ff;
  --panel2:#e0f7fa;
  --board1:#dbeafe;
  --board2:#e9d5ff;
  --cell1:#f0f9ff;
  --cell2:#f5f3ff;
  --accent1:#6366f1;
  --accent2:#0ea5e9;
  --accent3:#10b981;
  --text:#1e293b;
  --win:#22c55e;
}
*{box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif}
body{
  margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center;
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));color:var(--text);
}
.container{
  width:min(92vw,520px);padding:22px;border-radius:26px;
  background:linear-gradient(145deg,var(--panel1),var(--panel2));
  text-align:center;box-shadow:0 25px 60px rgba(0,0,0,.15);
  animation:floatPage 7s ease-in-out infinite alternate;
}
@keyframes floatPage{from{transform:translateY(0)}to{transform:translateY(-12px)}}
h1{margin:6px 0 10px}
.menu,.game{display:none}
.menu.active,.game.active{display:block}
.inputGroup{margin:10px 0}
input{
  padding:10px;margin:6px;border-radius:12px;border:1px solid #cbd5e1;
  background:linear-gradient(145deg,#f8fafc,#e2e8f0);width:160px;max-width:42%;
}
button{
  padding:11px 18px;margin:6px;border:none;border-radius:14px;cursor:pointer;
  font-weight:700;letter-spacing:.3px;color:white;
  background:linear-gradient(135deg,var(--accent1),var(--accent2),var(--accent3));
  box-shadow:0 10px 20px rgba(99,102,241,.25), inset 0 -2px 6px rgba(0,0,0,.15), inset 0 2px 6px rgba(255,255,255,.25);
  transition:.25s;
}
button:hover{transform:translateY(-3px)}
button.secondary{background:linear-gradient(135deg,#94a3b8,#cbd5e1);color:#0f172a}
.status{margin:10px 0;font-weight:700}
.scoreboard{display:flex;justify-content:center;gap:18px;font-weight:700;margin-top:4px}
.board{
  width:min(88vw,420px);height:min(88vw,420px);margin:16px auto;padding:12px;
  display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(6,1fr);gap:8px;
  border-radius:20px;background:linear-gradient(145deg,var(--board1),var(--board2));
  box-shadow:inset 6px 6px 14px rgba(0,0,0,.15), inset -6px -6px 14px rgba(255,255,255,.7);
}
.cell{
  background:linear-gradient(145deg,var(--cell1),var(--cell2));border-radius:14px;
  display:flex;justify-content:center;align-items:center;font-size:clamp(16px,3.8vw,26px);
  font-weight:800;cursor:pointer;transition:.18s;
  box-shadow:3px 3px 8px rgba(0,0,0,.12), -3px -3px 8px rgba(255,255,255,.9);
}
.cell:hover{transform:translateY(-2px)}
.cell.blink{animation:blinkPro .45s ease}
@keyframes blinkPro{
  0%{transform:scale(1)}
  50%{transform:scale(1.18);box-shadow:0 0 14px #7dd3fc;filter:brightness(1.1)}
  100%{transform:scale(1)}
}
.win{
  background:linear-gradient(135deg,#22c55e,#16a34a)!important;color:white;
  box-shadow:0 0 16px rgba(34,197,94,.9);
}
.trophy{font-size:46px;display:none}
.trophy.show{display:block;animation:cupFloat 1s ease-in-out infinite alternate}
@keyframes cupFloat{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.footer{margin-top:8px}
</style>
</head>

<body>
<div class="container">
  <h1>Tic Tac Toe 6×6</h1>

  <div class="menu active" id="menu">
    <div class="inputGroup">
      <input id="p1" placeholder="Player 1 Name">
      <input id="p2" placeholder="Player 2 / AI Name">
    </div>
    <div>
      <button onclick="setMode('pvp')">Player vs Player</button>
      <button onclick="setMode('ai')">Player vs AI</button>
    </div>
    <button onclick="startGame()">Start Game</button>
  </div>

  <div class="game" id="game">
    <div class="status" id="status"></div>
    <div class="scoreboard">
      <div id="scoreX">X: 0</div>
      <div id="scoreO">O: 0</div>
    </div>
    <div class="trophy" id="trophy">🏆</div>
    <div class="board" id="board"></div>

    <div class="footer">
      <button class="secondary" onclick="goMenu()">Menu</button>
      <button onclick="resetGame()">Reset</button>
    </div>
  </div>
</div>

<audio id="winSound">
  <source src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3">
</audio>

<script>
const SIZE=6, WIN_LEN=4;
let board=[], current="X", mode="pvp", gameOver=false;
let names={X:"Player 1",O:"Player 2"}, score={X:0,O:0};

const boardEl=document.getElementById("board");
const statusEl=document.getElementById("status");
const trophy=document.getElementById("trophy");
const winSound=document.getElementById("winSound");
const scoreX=document.getElementById("scoreX");
const scoreO=document.getElementById("scoreO");
const menu=document.getElementById("menu");
const game=document.getElementById("game");
const p1=document.getElementById("p1");
const p2=document.getElementById("p2");

function setMode(m){mode=m;}

function startGame(){
  names.X=p1.value||"Player 1";
  names.O=p2.value||(mode==="ai"?"Computer":"Player 2");
  menu.classList.remove("active");
  game.classList.add("active");
  resetGame();
}

function goMenu(){ game.classList.remove("active"); menu.classList.add("active"); }

function resetGame(){
  board=Array(SIZE*SIZE).fill("");
  current="X"; gameOver=false;
  trophy.classList.remove("show");
  statusEl.textContent=names[current]+"'s Turn ("+current+")";
  draw();
}

function draw(){
  boardEl.innerHTML="";
  board.forEach((v,i)=>{
    const c=document.createElement("div");
    c.className="cell";
    c.textContent=v;
    c.onclick=()=>move(i,c);
    boardEl.appendChild(c);
  });
}

function move(i,el){
  if(board[i]||gameOver) return;
  board[i]=current;
  el.textContent=current;
  el.classList.add("blink");
  setTimeout(()=>el.classList.remove("blink"),450);

  const winCells=checkWin();
  if(winCells){
    winCells.forEach(i=>boardEl.children[i].classList.add("win"));
    statusEl.textContent="Congratulations "+names[current]+" Wins!";
    trophy.classList.add("show");
    winSound.play();
    score[current]++; updateScore();
    gameOver=true; return;
  }

  if(board.every(x=>x)){statusEl.textContent="Draw Match";return;}
  current=current==="X"?"O":"X";
  statusEl.textContent=names[current]+"'s Turn ("+current+")";
  if(mode==="ai"&&current==="O") setTimeout(aiMove,300);
}

function updateScore(){
  scoreX.textContent="X: "+score.X;
  scoreO.textContent="O: "+score.O;
}

function aiMove(){
  let empty=board.map((v,i)=>v?null:i).filter(v=>v!==null);
  let m=empty[Math.floor(Math.random()*empty.length)];
  move(m,boardEl.children[m]);
}

function checkWin(){
  const idx=(r,c)=>r*SIZE+c, lines=[];
  for(let r=0;r<SIZE;r++)for(let c=0;c<=SIZE-WIN_LEN;c++)
    lines.push([...Array(WIN_LEN)].map((_,k)=>idx(r,c+k)));
  for(let c=0;c<SIZE;c++)for(let r=0;r<=SIZE-WIN_LEN;r++)
    lines.push([...Array(WIN_LEN)].map((_,k)=>idx(r+k,c)));
  for(let r=0;r<=SIZE-WIN_LEN;r++)for(let c=0;c<=SIZE-WIN_LEN;c++)
    lines.push([...Array(WIN_LEN)].map((_,k)=>idx(r+k,c+k)));
  for(let r=WIN_LEN-1;r<SIZE;r++)for(let c=0;c<=SIZE-WIN_LEN;c++)
    lines.push([...Array(WIN_LEN)].map((_,k)=>idx(r-k,c+k)));
  for(const line of lines) if(line.every(i=>board[i]===current)) return line;
  return false;
}
</script>
</body>
</html>
